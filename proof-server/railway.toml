[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install ezkl"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
